<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    <title>AI Blog Writer | GyaniGuru - SEO Content Generation</title>
    <meta name="description" content="Generate SEO-optimized blog posts with AI. Create engaging content for your website in seconds.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="AI Blog Writer | GyaniGuru">
    <meta property="og:description" content="Generate SEO-optimized blog posts with AI">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="antialiased min-h-screen flex flex-col bg-slate-900 text-slate-50">
    
    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-panel border-b border-slate-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                    <i class="fa-solid fa-bolt text-green-500 text-2xl"></i>
                    <span class="text-xl font-bold tracking-tight">AI<span class="text-green-500">Hub</span></span>
                </a>
                
                <div class="hidden md:flex items-center gap-6">
                    <a href="chat.html" class="text-slate-300 hover:text-white transition">AI Chat</a>
                    <a href="image.html" class="text-slate-300 hover:text-white transition">Image Gen</a>
                    <a href="blog.html" class="text-white font-medium border-b-2 border-green-500 pb-1">Blog</a>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex flex-col items-end">
                        <span class="text-xs text-slate-400">Credits</span>
                        <span id="credit-display" class="text-sm font-bold text-green-400">5 / 5</span>
                    </div>
                    <a href="../index.html#pricing" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                        Upgrade
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto w-full">
        
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-4 flex items-center justify-center gap-3">
                <i class="fa-solid fa-blog text-green-500"></i>
                AI Blog Writer
            </h1>
            <p class="text-slate-400 text-lg">Generate SEO-optimized blog posts in seconds</p>
        </div>

        <!-- Input Section -->
        <div class="glass-panel rounded-2xl p-6 border border-slate-700 mb-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Blog Topic / Title</label>
                    <input type="text" id="blog-topic" placeholder="e.g., The Benefits of Meditation for Mental Health"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-500 transition">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Tone</label>
                        <select id="blog-tone" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition">
                            <option value="professional">Professional</option>
                            <option value="casual">Casual</option>
                            <option value="friendly">Friendly</option>
                            <option value="authoritative">Authoritative</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Length</label>
                        <select id="blog-length" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition">
                            <option value="short">Short (~300 words)</option>
                            <option value="medium" selected>Medium (~600 words)</option>
                            <option value="long">Long (~1000 words)</option>
                        </select>
                    </div>
                </div>
                
                <button onclick="blogApp.generate()" id="generate-btn" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-bold py-4 rounded-lg transition shadow-lg shadow-green-500/20 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    Generate Blog Post
                </button>
            </div>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-white">Generated Content</h2>
                <div class="flex gap-2">
                    <button onclick="blogApp.copy()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition text-sm flex items-center gap-2">
                        <i class="fa-regular fa-copy"></i>
                        Copy
                    </button>
                    <button onclick="blogApp.download()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition text-sm flex items-center gap-2">
                        <i class="fa-solid fa-download"></i>
                        Download
                    </button>
                </div>
            </div>
            
            <div class="glass-panel rounded-2xl p-6 border border-slate-700 bg-slate-800/30">
                <article id="blog-content" class="prose prose-invert max-w-none">
                    <!-- Content will be inserted here -->
                </article>
            </div>
        </div>

        <!-- History -->
        <div class="mt-12">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left text-slate-400"></i>
                Recent Blog Posts
            </h3>
            <div id="history-list" class="space-y-2">
                <p class="text-slate-500 text-sm">No blog posts generated yet</p>
            </div>
        </div>

    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/credits.js"></script>
    <script src="../services/history.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
</body>
</html>
