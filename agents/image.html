    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script>
        // ==========================================
        // INLINE FIREBASE & AUTH
        // ==========================================
        
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        let app = null;
        let authInstance = null;
        let currentUser = null;

        function initFirebase() {
            if (typeof firebase === 'undefined') {
                console.log('Firebase SDK not loaded, using local mode');
                loadLocalUser();
                return;
            }
            try {
                if (!firebase.apps.length) { app = firebase.initializeApp(firebaseConfig); } else { app = firebase.app(); }
                authInstance = firebase.auth();
                authInstance.onAuthStateChanged((user) => { currentUser = user; });
            } catch (error) { console.error('Firebase error:', error); loadLocalUser(); }
        }

        function loadLocalUser() {
            const data = localStorage.getItem('gyaniguru_user');
            if (data) currentUser = JSON.parse(data);
        }

        function getCurrentUser() { return currentUser; }

        // Usage Tracker
        const usageTracker = {
            getUsage() {
                const user = getCurrentUser();
                const today = new Date().toDateString();
                const plan = user?.plan || localStorage.getItem('gyaniguru_plan') || 'free';
                const storageKey = user ? `gyaniguru_usage_${user.uid}` : 'gyaniguru_usage_anonymous';
                let data = JSON.parse(localStorage.getItem(storageKey)) || {};
                if (data.date !== today) { data = { date: today, used: 0, plan: plan }; localStorage.setItem(storageKey, JSON.stringify(data)); }
                return { ...data, plan };
            },
            recordUsage() {
                const usage = this.getUsage();
                const user = getCurrentUser();
                const storageKey = user ? `gyaniguru_usage_${user.uid}` : 'gyaniguru_usage_anonymous';
                usage.used++;
                localStorage.setItem(storageKey, JSON.stringify(usage));
                return usage;
            },
            canUse() { const usage = this.getUsage(); if (usage.plan === 'pro') return true; return usage.used < 5; },
            getRemaining() { const usage = this.getUsage(); if (usage.plan === 'pro') return Infinity; return Math.max(0, 5 - usage.used); }
        };

        // ==========================================
        // API SERVICE
        // ==========================================
        
        async function callAgent(agentId, input) {
            const agent = CONFIG.agents[agentId];
            if (!agent) throw new Error('Agent not found');
            const url = agent.webhookUrl;
            if (!url || url.includes('your-n8n-instance')) throw new Error('Please configure your n8n webhook in config.js');
            
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 60000);
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ agent: agentId, input: input, timestamp: new Date().toISOString() }),
                signal: controller.signal
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            const data = await response.json();
            
            if (data.image_url) return { type: 'image', url: data.image_url };
            if (data.url) return { type: 'image', url: data.url };
            if (data.image) return { type: 'image', url: data.image };
            
            const fields = ['response', 'output', 'result', 'text', 'message'];
            for (const field of fields) { if (data[field]) return { type: 'text', content: String(data[field]) }; }
            return { type: 'text', content: JSON.stringify(data) };
        }

        // ==========================================
        // UI UTILITIES
        // ==========================================
        
        function updateStatus(element, status) {
            if (!element) return;
            const classes = { idle: 'status-idle', running: 'status-running', success: 'status-success', error: 'status-error' };
            Object.values(classes).forEach(c => element.classList.remove(c));
            element.classList.add(classes[status] || classes.idle);
            const icons = { idle: '<i class="fa-solid fa-circle text-xs"></i>', running: '<span class="spinner spinner-sm"></span>', success: '<i class="fa-solid fa-check text-xs"></i>', error: '<i class="fa-solid fa-xmark text-xs"></i>' };
            const texts = { idle: 'Idle', running: 'Running', success: 'Completed', error: 'Error' };
            element.innerHTML = `${icons[status] || icons.idle} ${texts[status] || status}`;
        }

        function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = Math.min(textarea.scrollHeight, 400) + 'px'; }

        function showToast(message, type = 'info') {
            const container = document.querySelector('.toast-container') || (() => { const c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); return c; })();
            const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
            const colors = { success: 'text-green-400', error: 'text-red-400', warning: 'text-yellow-400', info: 'text-brand-400' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fa-solid ${icons[type]} ${colors[type]} text-lg"></i><div class="flex-1"><p class="text-sm font-medium text-white">${message}</p></div><button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        // ==========================================
        // IMAGE GENERATOR STATE & FUNCTIONS
        // ==========================================
        
        let generatedImageUrl = '';
        let isProcessing = false;
        let selectedStyle = '';
        
        function updateCredits() {
            const remaining = usageTracker.getRemaining();
            const el = document.getElementById('credits-display');
            if (el) el.textContent = remaining === Infinity ? '∞' : `${remaining}/5`;
        }

        function selectStyle(btn, style) {
            selectedStyle = style;
            document.querySelectorAll('.style-option').forEach(el => {
                el.classList.remove('active');
                el.classList.remove('border-brand-500/50');
                el.classList.add('border-slate-700');
                el.classList.remove('text-white');
                el.classList.add('text-slate-400');
            });
            btn.classList.add('active');
            btn.classList.add('border-brand-500/50');
            btn.classList.remove('border-slate-700');
            btn.classList.add('text-white');
            btn.classList.remove('text-slate-400');
        }

        function useImagePrompt(text) {
            const input = document.getElementById('prompt-input');
            input.value = text;
            input.focus();
            autoResize(input);
        }

        function showState(state) {
            const states = ['image-placeholder', 'image-loading', 'image-result', 'image-error'];
            states.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('hidden'); });
            const target = document.getElementById('image-' + state);
            if (target) target.classList.remove('hidden');
        }

        async function generateImage() {
            const promptInput = document.getElementById('prompt-input');
            const generateBtn = document.getElementById('generate-btn');
            const statusBadge = document.getElementById('status-badge');
            const outputActions = document.getElementById('output-actions');
            const downloadLink = document.getElementById('download-link');
            
            const prompt = promptInput ? promptInput.value.trim() : '';
            if (!prompt) { showToast('Please enter a description', 'warning'); if (promptInput) promptInput.focus(); return; }
            if (!usageTracker.canUse()) { showToast('Daily limit reached. Upgrade to Pro!', 'warning'); return; }
            
            let enhancedPrompt = prompt;
            if (selectedStyle) enhancedPrompt += `, ${selectedStyle.replace('-', ' ')} style`;
            
            isProcessing = true;
            if (generateBtn) generateBtn.disabled = true;
            updateStatus(statusBadge, 'running');
            showState('loading');
            if (outputActions) { outputActions.style.opacity = '0'; outputActions.style.pointerEvents = 'none'; }
            
            usageTracker.recordUsage();
            updateCredits();
            
            try {
                const result = await callAgent('image', enhancedPrompt);
                
                if (result.type === 'image' && result.url) {
                    generatedImageUrl = result.url;
                    const img = new Image();
                    img.onload = () => {
                        const imgEl = document.getElementById('generated-image');
                        if (imgEl) imgEl.src = result.url;
                        showState('result');
                        if (downloadLink) { downloadLink.href = result.url; downloadLink.download = `gyaniguru-${Date.now()}.png`; }
                        if (outputActions) { outputActions.style.opacity = '1'; outputActions.style.pointerEvents = 'auto'; }
                        updateStatus(statusBadge, 'success');
                        showToast('Image generated successfully!', 'success');
                    };
                    img.onerror = () => { throw new Error('Failed to load generated image'); };
                    img.src = result.url;
                } else {
                    throw new Error('Invalid response: no image URL found');
                }
            } catch (error) {
                console.error('Image generation error:', error);
                const errorMsg = document.getElementById('error-message');
                if (errorMsg) errorMsg.textContent = error.message || 'Failed to generate image';
                showState('error');
                updateStatus(statusBadge, 'error');
                showToast(error.message || 'Failed to generate image', 'error');
            } finally {
                isProcessing = false;
                if (generateBtn) generateBtn.disabled = false;
                setTimeout(() => updateStatus(statusBadge, 'idle'), 2000);
            }
        }

        function retryGeneration() { showState('placeholder'); generateImage(); }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => { initFirebase(); updateCredits(); });
    </script>
